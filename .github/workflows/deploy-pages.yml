# Deploys the site to GitHub Pages on every push to main.
#
# Why this exists: the repo's automatic "pages build and deployment" stopped
# triggering after 2026-05-31 (the June pushes produced no Pages builds at
# all), which left the live site stale. This workflow deploys explicitly and
# shows up in the Actions tab, so a broken deploy is visible instead of
# silent. `enablement: true` (re)configures Pages for workflow deploys if
# the settings ever drift again.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
